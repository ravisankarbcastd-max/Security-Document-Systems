<center>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>டிஜிட்டல் ஆவண பாதுகாப்பு அமைப்பு</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>🔒 பாதுகாப்பு ஆவண அமைப்பு</h1>
            <form id="loginForm">
                <input type="text" id="username" placeholder="பயனர் பெயர்" required>
                <input type="password" id="password" placeholder="கடவுச்சொல்" required>
                <button type="submit">புகுபதிவு</button>
            </form>
            <p id="loginError" class="error"></p>
            <a href="#" onclick="showRegister()">புதிய கணக்கு உருவாக்கு</a>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>
</center>
